<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="pulseGradient" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#007BFF" stop-opacity="1" />
            <stop offset="100%" stop-color="#007BFF" stop-opacity="0" />
        </radialGradient>
        <mask id="pulseMask">
            <circle cx="50" cy="50" r="40" fill="url(#pulseGradient)" />
        </mask>
    </defs>
    <circle cx="50" cy="50" r="45" fill="none" stroke="#007BFF" stroke-width="10" />
    <circle cx="50" cy="50" r="0" fill="#007BFF" mask="url(#pulseMask)">
        <animate attributeName="r" from="0" to="40" dur="1s" repeatCount="indefinite" />
    </circle>
    <circle cx="50" cy="50" r="10" fill="#007BFF" />
</svg>
